<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Talent Loop</title>
    <meta name="description" content="The page you are looking for does not exist. Return to Talent Loop's homepage to explore recruitment opportunities and career resources.">
    <meta name="robots" content="noindex">
    <link rel="canonical" href="https://talent-loop.org/404">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box}
        :root{--font-heading:'Playfair Display',Georgia,serif;--font-body:'DM Sans',sans-serif;--color-navy:#1a2b5f;--color-gold:#D4AF37;--color-bg-base:#FDFDFD}
        body{margin:0;font-family:var(--font-body);background:var(--color-bg-base);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
        .container{max-width:500px}
        h1{font-family:var(--font-heading);font-size:6rem;margin:0;color:var(--color-navy);line-height:1}
        h2{font-family:var(--font-heading);font-size:1.5rem;color:var(--color-navy);margin:.5rem 0 1rem}
        p{color:#495057;line-height:1.7;margin-bottom:2rem}
        .btn{display:inline-block;padding:.9rem 2rem;background:var(--color-gold);color:var(--color-navy);text-decoration:none;border-radius:5px;font-weight:700;transition:background .3s}
        .btn:hover{background:#c9a227}
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
